<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS Atlas | Reset Password</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1318;--surface:#171c22;--surface2:#20262e;--text:#eef2f6;--muted:#aab4bf;--line:#303844;--blue:#5f8fff}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{width:min(calc(100% - 24px),520px);margin:42px auto}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:28px}
    form{display:grid;gap:14px;margin-top:18px}
    label{display:grid;gap:8px;font-weight:700}
    input{width:100%;min-height:48px;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:var(--surface2);color:var(--text)}
    button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:12px 16px;border-radius:999px;font-weight:800;border:none;background:var(--blue);color:#fff;cursor:pointer}
    a{color:#d7e3ff}
    .msg{margin-top:12px;color:#9be7b3;min-height:24px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Reset password</h1>
      <p style="color:#aab4bf">Enter your email address to request a password reset.</p>
      <form id="resetForm">
        <label>Email<input type="email" name="email" autocomplete="email" required /></label>
        <button type="submit">Send reset link</button>
      </form>
      <div class="msg" id="msg"></div>
      <p><a href="/login.html">Back to login</a></p>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      const res = await window.LifeOS.post('/api/auth/reset-password', payload);
      document.getElementById('msg').textContent = res.message || 'Request recorded';
    });
  </script>
</body>
</html>
