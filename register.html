<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS Atlas | Register</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1318;--surface:#171c22;--surface2:#20262e;--text:#eef2f6;--muted:#aab4bf;--line:#303844;--blue:#5f8fff}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{width:min(calc(100% - 24px),620px);margin:42px auto}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:28px}
    form{display:grid;gap:14px;margin-top:18px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    label{display:grid;gap:8px;font-weight:700}
    input{width:100%;min-height:48px;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:var(--surface2);color:var(--text)}
    button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:12px 16px;border-radius:999px;font-weight:800;border:none;background:var(--blue);color:#fff;cursor:pointer}
    a{color:#d7e3ff}
    .msg{margin-top:12px;color:#ffb4b4;min-height:24px}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Create account</h1>
      <p style="color:#aab4bf">Register to begin using LifeOS Atlas during the current open-access period.</p>
      <form id="registerForm">
        <div class="grid">
          <label>First name<input type="text" name="firstName" autocomplete="given-name" required /></label>
          <label>Last name<input type="text" name="lastName" autocomplete="family-name" required /></label>
        </div>
        <label>Email<input type="email" name="email" autocomplete="email" required /></label>
        <label>Password<input type="password" name="password" autocomplete="new-password" required /></label>
        <button type="submit">Create account</button>
      </form>
      <div class="msg" id="msg"></div>
      <p><a href="/login.html">Already registered? Login</a></p>
      <p><a href="/index.html">Back to home</a></p>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      const res = await window.LifeOS.post('/api/auth/register', payload);
      if (!res.ok) {
        document.getElementById('msg').textContent = res.error || 'Registration failed';
        return;
      }
      window.LifeOS.track('signup_success', 'auth', res.user.email);
      location.href = res.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
    });
  </script>
</body>
</html>
