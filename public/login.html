<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS Atlas | Login</title>
  <style>
    :root{--teal:#0f6f73;--gray:#6f747b;--line:rgba(255,255,255,.14);--text:#fff;--text-soft:rgba(255,255,255,.82);--orange:#ef8a24;--blue:#4c8fd6;--shadow:0 18px 46px rgba(0,0,0,.16)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--teal);color:var(--text)} a{text-decoration:none;color:inherit}
    .top{background:var(--gray);padding:16px 20px}.wrap{max-width:560px;margin:0 auto;padding:44px 20px 60px}
    .form{display:grid;gap:14px}.field{display:grid;gap:8px} label{font-weight:700} input{min-height:50px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;padding:0 14px}
    .btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;font-weight:800;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow)}
    .primary{background:#fff;color:#5f646b}.secondary{background:rgba(76,143,214,.18);border-color:rgba(76,143,214,.34)} p{color:var(--text-soft);line-height:1.6}
  </style>
</head>
<body>
  <div class="top"><a href="/">â† Back to home</a></div>
  <div class="wrap">
    <h1>Login</h1>
    <p>Members and returning users can sign in here. This restores a visible login destination from the landing page.</p>
    <form class="form">
      <div class="field"><label for="email">Email</label><input id="email" type="email" placeholder="you@example.com" /></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" placeholder="Enter your password" /></div>
      <div class="btns"><button class="btn primary" type="submit">Sign in</button><a class="btn secondary" href="/faq">Need help?</a></div>
    </form>
  </div>
</body>
</html>
