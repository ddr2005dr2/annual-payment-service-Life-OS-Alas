<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atlas Dashboard  LifeOS Atlas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/atlas.css">
</head>
<body class="atlas-theme atlas-app">
  <div class="atlas-app-shell">
    <aside class="atlas-sidebar" id="atlas-sidebar">
      <!-- Sidebar rendered from config/navigation.json -->
    </aside>
    <main class="atlas-dashboard-main">
      <section id="todays-missions" class="atlas-section">
        <!-- Today's Missions card -->
      </section>
      <section id="module-grid" class="atlas-section">
        <!-- Module cards for Admin, Money, Health, Family -->
      </section>
      <section id="quick-actions" class="atlas-section">
        <!-- Quick Actions -->
      </section>
      <section id="status-indicators" class="atlas-section">
        <!-- Status dots (active / needs attention / idle) -->
      </section>
    </main>
    <div id="atlas-concierge-bubble" class="atlas-concierge-bubble">
      <!-- Concierge dock -->
    </div>
  </div>
</body>
</html>
