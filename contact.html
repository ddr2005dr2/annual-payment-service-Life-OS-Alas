<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS Atlas | Contact</title>
  <link rel="canonical" href="/contact.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f5f7;--surface:#fff;--text:#14181d;--muted:#65707c;--line:#d6dde5;--blue:#2f6fed}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{width:min(calc(100% - 24px),880px);margin:32px auto}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:28px}
    form{display:grid;gap:14px;margin-top:18px}
    label{display:grid;gap:8px;font-weight:700}
    input,textarea{width:100%;padding:14px 15px;border:1px solid var(--line);border-radius:14px;background:#fff}
    button{min-height:46px;padding:12px 16px;border-radius:999px;border:none;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}
    p{line-height:1.8;color:var(--muted)} a{color:inherit;text-decoration:none}
    .msg{margin-top:12px;color:#2f6fed;min-height:24px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Contact</h1>
      <p>Contact is available as a structured written channel. This autonomous system is designed to minimize direct support dependency.</p>
      <form id="contactForm">
        <label>Name<input type="text" name="name" required /></label>
        <label>Email<input type="email" name="email" required /></label>
        <label>Message<textarea name="message" rows="6" required></textarea></label>
        <button type="submit">Send message</button>
      </form>
      <div class="msg" id="msg"></div>
      <p><a href="/index.html">Back to home</a></p>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      await window.LifeOS.post('/api/events', { type: 'contact_request', label: payload.email, value: payload.message });
      document.getElementById('msg').textContent = 'Message recorded.';
      e.target.reset();
    });
  </script>
</body>
</html>
